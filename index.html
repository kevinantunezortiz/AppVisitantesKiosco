<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Visitantes - Museo Regional</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <meta name="theme-color" content="#000000" />

    <style>
      body {
        background-color: #f4f7f6;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      .navbar {
        background: #611232;
        border-bottom: 2px solid #e9ecef;
        padding: 5px 0;
      }

      .logo-nav {
        height: 50px;
        cursor: pointer;
      }

      .carousel-item img {
        height: 270px;
        object-fit: contain;
      }

      .section {
        display: none;
      }

      .active {
        display: block;
      }

      .card-custom {
        border-radius: 15px;
        border: none;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      }

      .radio-img-container {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 15px;
        border: 1px solid #dee2e6;
        border-radius: 10px;
        margin-bottom: 10px;
        transition: all 0.3s;
        cursor: pointer;
        background: white;
        height: 100%;
        /* Para que todos los cuadros midan lo mismo */
      }

    .radio-img-container input[type="radio"] {
  position: absolute;
  opacity: 0;
}

/* Hover */
.radio-img-container:hover {
  border-color: #0d6efd;
  background-color: #f0f7ff;
}

/* Cuando está seleccionado */
.radio-img-container:has(input[type="radio"]:checked) {
  border-color: #084cb3;      /* azul oscuro */
  background-color: #cce6ff;  /* azul claro */
}

      .icon-radio {
        width: 70px;
        height: 70px;
        flex-shrink: 0;
        /* Evita que el icono se aplaste con texto largo */
        object-fit: contain;
      }
            #admin-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        z-index: 2000;
        overflow-y: auto;
        padding: 20px;
      }
    </style>
  </head>

  <body>
    <nav class="navbar sticky-top">
      <div class="container d-flex justify-content-between align-items-center">
        <img src="iconos/secretaria.png" class="logo-nav" />
        <img src="iconos/mrg3.png" id="btn-admin-logo" class="logo-nav" />

        <img id="btnApagar" src="iconos/inah.png" class="logo-nav" />
      </div>
    </nav>

    <div
      id="carouselExampleSlidesOnly"
      class="carousel slide"
      data-bs-ride="carousel"
      data-bs-interval="3000"
    >
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="carrousel/6.jpg" class="d-block w-100" />
        </div>
        <div class="carousel-item">
          <img src="carrousel/1.jpg" class="d-block w-100" />
        </div>
        <div class="carousel-item">
          <img src="carrousel/2.jpg" class="d-block w-100" />
        </div>
        <div class="carousel-item">
          <img src="carrousel/3.jpg" class="d-block w-100" />
        </div>
        <div class="carousel-item">
          <img src="carrousel/4.jpg" class="d-block w-100" />
        </div>
        <div class="carousel-item">
          <img src="carrousel/5.jpg" class="d-block w-100" />
        </div>
      </div>
    </div>

    <div class="container mt-3 pb-5">
      <div id="step-1" class="card card-custom p-4">
        <h4 id="titulo-persona">Registro Visitante</h4>
        <form id="form-registro">
          <h6>Paso 1</h6>
          <p class="fw-bold mb-2">
            ¿Cómo te identificas? (Elige una de las 16 Opciones)
          </p>
          <div class="row mb-3">
            <script>
              const grupos = [
                { id: "hombres", txt: "Hombre" },
                { id: "mujeres", txt: "Mujer" },
                { id: "nobinarios", txt: "No Binario" },
                { id: "prefiero_no_decirlo", txt: "Prefiero no responder" },
                { id: "lgbttqimas", txt: "LGBTTTQI+" },
                { id: "infancias_adolescentes", txt: "Infancias/Adolescentes" },
                { id: "adultosmayores", txt: "Adultos Mayores" },
                { id: "afrodescendientes", txt: "Personas Afrodescendientes" },
                { id: "personas_artesanas", txt: "Personas Artesanas" },
                {
                  id: "personas_con_discapacidad",
                  txt: "Personas con Discapacidad",
                },
                {
                  id: "personas_embarazadas",
                  txt: "Embarazadas, En Lactancia, Jefas de Familia o en Situación de Vulnerabilidad",
                },
                {
                  id: "situacion_calle",
                  txt: "Personas en Situación de Calle",
                },
                { id: "personas_indigenas", txt: "Personas Indígenas" },
                { id: "personas_jovenes", txt: "Personas Jóvenes" },
                {
                  id: "personas_migrantes",
                  txt: "Personas Migrantes y en situación de refugio",
                },
              ];
              grupos.forEach((g) => {
                document.write(`
                                <div class="col-md-6 col-lg-3 cambio">
                                    <label class="radio-img-container">
                                        <input type="radio" name="grupo_social" value="${g.id}">
                                        <img src="iconos/${g.id}.png" class="icon-radio">
                                        <span style="font-size: 0.85rem; line-height: 1.1;">${g.txt}</span>
                                    </label>
                                </div>
                            `);
              });
            </script>
          </div>
          <div class="text-end mt-4">
            <h6>Paso 2</h6>
            <button
              type="button"
              id="btn-finalizar"
              class="btn btn-success btn-lg px-5"
            >
              Finalizar
            </button>
          </div>
        </form>
      </div>

      <div id="step-2" class="section card card-custom p-5 text-center">
        <h1 class="display-4 text-success">¡Muchas Gracias!</h1>
        <div
          class="spinner-border text-success my-3"
          style="width: 3rem; height: 3rem"
        ></div>
        <p class="lead">Disfruta de tu visita...</p>
      </div>
    </div>

    <div id="admin-panel" class="section">
      <div class="container">
        <div
          class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4"
        >
          <h2>Reporte por Colección: visitas_detalladas</h2>
          <div>
            <button id="btn-export-excel" class="btn btn-success btn-sm">
              Excel
            </button>
            <button id="btn-export-pdf" class="btn btn-danger btn-sm">
              PDF
            </button>
            <button id="btn-close-admin" class="btn btn-outline-dark btn-sm">
              Cerrar
            </button>
          </div>
        </div>

        <div class="row mb-4 bg-light p-3 rounded">
          <div class="col-md-4">
            <label class="form-label fw-bold">Año:</label>
            <select id="filter-year" class="form-select"></select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-bold">Mes:</label>
            <select id="filter-month" class="form-select"></select>
          </div>
          <div class="col-md-4 d-flex align-items-end">
            <button id="btn-generar-reporte" class="btn btn-primary w-100">
              Generar Informe
            </button>
          </div>
        </div>

        <div id="reporte-content"></div>
      </div>
    </div>

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/xlsx.full.min.js"></script>
    <script src="js/jspdf.umd.min.js"></script>
    <script src="js/jspdf.plugin.autotable.min.js"></script>
    <script src="js/firebase-app.js"></script>
    <script src="js/firebase-firestore.js"></script>
    <script>
      document.getElementById("btnApagar").addEventListener("click", apagarEquipo );
      function apagarEquipo (){
        const respuesta =confirm('¿Estás seguro de quieres apagar el equipo?')
        if(respuesta){
                  fetch("shutdown.php", { method: "POST" })
          .then((response) => response.text())
          .then((data) => alert(data))
          .catch((error) => alert("Error: " + error));
        }
      }
    </script>
    <script type="module">
      const firebaseConfig = {
        apiKey: "AIzaSyDfHasUn9olSiAe59At2XcZFnyYMvGJm2U",
        authDomain: "appvisitantes-c3b62.firebaseapp.com",
        projectId: "appvisitantes-c3b62",
        storageBucket: "appvisitantes-c3b62.firebasestorage.app",
        messagingSenderId: "924367990190",
        appId: "1:924367990190:web:48d333388355359e5cac3f",
      };

      firebase.initializeApp(firebaseConfig);
      var db = firebase.firestore();

      db.enablePersistence()
        .then(function () {
          console.log(
            "✅ Persistencia activada: Los datos se guardarán localmente si no hay red.",
          );
        })
        .catch(function (err) {
          if (err.code == "failed-precondition") {
            console.warn(
              "La persistencia falló: Solo una pestaña puede estar abierta a la vez.",
            );
          } else if (err.code == "unimplemented-custom-browser") {
            console.warn("Este navegador no soporta almacenamiento local.");
          }
        });
      let totalP = 0,
        actualP = 1;
      $("#btn-finalizar").prop("disabled", true);

      $('input[name="grupo_social"]').change(() => {
        $("#btn-finalizar").prop("disabled", false);
      });

      $("#btn-finalizar").click(function () {
        saveToFirebase();
        $("#step-1").hide();
        $("#step-2").fadeIn();
        setTimeout(() => {
          actualP = 1;
          $("#form-registro")[0].reset();
          $("#step-2").hide();
          $("#step-1").show();
          $("#btn-finalizar").prop("disabled", true);
        }, 2000);
      });

      function updateUI() {
        if (actualP >= totalP) {
          $("#btn-siguiente").hide();
          $("#btn-finalizar").removeClass("d-none").show();
        }
      }

      async function saveToFirebase() {
        const grp = $('input[name="grupo_social"]:checked').val();
        if (!grp) return;
        const ahora = new Date();
        console.log(ahora)
        try {
          // Colección visitas_detalladas
          console.log(await db.collection("visitas_detalladas").add({
            grupo: grp,
            anio: ahora.getFullYear().toString(),
            dia: ahora.getDate(),
            mes: ahora.toLocaleString("es-ES", { month: "long" }),
            timestamp: Date.now(),
          }));
          
        } catch (e) {
          console.error(e);
        }
      }

      $("#btn-admin-logo").on("dblclick", async function () {
        $("#admin-panel").fadeIn();
        await cargarFiltros();
      });

      async function cargarFiltros() {
        const snap = await db.collection("visitas_detalladas").get();
        let anios = new Set();
        let meses = new Set();
        snap.forEach((doc) => {
          const d = doc.data();
          if (d.anio) anios.add(d.anio);
          if (d.mes) meses.add(d.mes);
        });
        $("#filter-year").empty();
        anios.forEach((a) =>
          $("#filter-year").append(`<option value="${a}">${a}</option>`),
        );
        $("#filter-month").empty();
        meses.forEach((m) =>
          $("#filter-month").append(
            `<option value="${m}">${m.toUpperCase()}</option>`,
          ),
        );
      }

      $("#btn-generar-reporte").click(async function () {
        const selYear = $("#filter-year").val();
        const selMonth = $("#filter-month").val();
        const snap = await db.collection("visitas_detalladas").get();
        let counts = {};
        let total_mujeres = 0;
        let total_hombres = 0;
        let total_nobinarios = 0;
        let total_prefierond = 0;

        snap.forEach((doc) => {
          const d = doc.data();
          if (d.anio === selYear && d.mes === selMonth) {
            const clave = `${d.genero} | ${d.grupo_social}`;
            counts[clave] = (counts[clave] || 0) + 1;
          }
          if (d.genero === "mujeres") total_mujeres += 1;
          else if (d.genero === "hombres") total_hombres += 1;
          else if (d.genero === "nobinarios") total_nobinarios += 1;
          else if (d.genero === "prefiero_no_decirlo") total_prefierond += 1;
        });
        let html = `<strong>Total de hombres: ${total_hombres}<br><strong>Total de mujeres: ${total_mujeres}<br><strong>Total de No Binarios: ${total_nobinarios}<br><strong>Total de Prefiero no decirlo: ${total_prefierond}<br>`;
        html += `<table id="tabla-reporte" class="table table-bordered table-striped mt-3">
                        <thead class="table-dark"><tr><th>Año</th><th>Mes</th><th>Género | Grupo</th><th>Total</th></tr></thead><tbody>`;
        for (const k in counts) {
          html += `<tr><td>${selYear}</td><td>${selMonth.toUpperCase()}</td><td>${k}</td><td>${counts[k]}</td></tr>`;
        }
        $("#reporte-content").html(
          Object.keys(counts).length
            ? html + "</tbody></table>"
            : '<div class="alert alert-info">No se encontraron registros.</div>',
        );
      });

      $("#btn-close-admin").click(() => {
        $("#reporte-content").empty();
        $("#admin-panel").fadeOut();
      });
      $("#btn-export-excel").click(() => {
        XLSX.writeFile(
          XLSX.utils.table_to_book(document.getElementById("tabla-reporte")),
          "Reporte_Visitantes.xlsx",
        );
      });
      $("#btn-export-pdf").click(() => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.autoTable({ html: "#tabla-reporte" });
        doc.save("Reporte_Visitantes.pdf");
      });
    </script>
  </body>
</html>
